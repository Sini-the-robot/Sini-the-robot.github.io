name: Update Florae

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Florae
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python plant_frame.py

      - name: Commit and push
        run: |
          git config user.email "florae-bot@github.com"
          git config user.name "Florae Bot"
          git add florae.html archive.json archive.html
          git commit -m "florae: auto update $(date -u '+%H:%M UTC')" || echo "nothing to commit"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/Sini-the-robot/Sini-the-robot.github.io.git main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
