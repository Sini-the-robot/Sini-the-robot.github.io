name: Update Florae

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Florae
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python plant_frame.py

      - name: Commit and push
        run: |
          git config user.email "florae-bot@github.com"
          git config user.name "Florae Bot"
          git add florae.html archive.json archive.html
          git commit -m "florae: auto update $(date -u '+%H:%M UTC')" || echo "nothing to commit"
          git push
