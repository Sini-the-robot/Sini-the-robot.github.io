<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Florae · Botanical Intelligence</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230e0e0c'/%3E%3Cpath d='M16 28 C16 28 16 14 16 11 C16 4 22 2 26 5 C26 5 20 9 19 15' fill='%235a9a6a'/%3E%3Cpath d='M16 20 C16 20 12 15 8 15 C4 15 4 20 7 23 C10 26 16 22 16 20' fill='%232d5a3d'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#0a0a08;font-family:'DM Serif Display',Georgia,serif;color:#f2ece0;overflow:hidden;}

  .bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;}
  .bg-canvas svg{position:absolute;opacity:0.04;}
  .stem-1{bottom:-10%;left:8%;animation:sway 8s ease-in-out infinite;transform-origin:bottom center;}
  .stem-2{bottom:-5%;right:12%;animation:sway 11s ease-in-out infinite reverse;transform-origin:bottom center;}
  .stem-3{bottom:-15%;left:40%;animation:sway 14s ease-in-out infinite 2s;transform-origin:bottom center;}
  @keyframes sway{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}

  .particle{position:absolute;border-radius:50%;background:#5a9a6a;animation:float linear infinite;opacity:0;}
  @keyframes float{
    0%{opacity:0;transform:translateY(0);}
    10%{opacity:0.5;}90%{opacity:0.2;}
    100%{opacity:0;transform:translateY(-100vh) translateX(20px);}
  }

  .content{
    position:relative;z-index:10;
    width:100vw;height:100vh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:2rem;
  }

  /* wordmark */
  .wordmark{
    font-size:clamp(3.5rem,10vw,6.5rem);
    font-style:italic;
    font-weight:400;
    letter-spacing:0.02em;
    color:rgba(242,236,224,0.92);
    margin-bottom:0.6rem;
    animation:fadeDown 1.2s ease forwards;opacity:0;
  }

  .tagline-brand{
    font-family:'DM Mono',monospace;
    font-size:0.5rem;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:#5a9a6a;
    margin-bottom:3rem;
    animation:fadeDown 1.3s ease forwards;opacity:0;animation-delay:0.2s;
    display:flex;align-items:center;gap:0.8rem;
  }
  .tagline-brand::before,.tagline-brand::after{content:'';width:20px;height:1px;background:rgba(90,154,106,0.35);}

  .headline{
    font-size:clamp(1.4rem,3.5vw,2.4rem);font-style:italic;
    line-height:1.15;text-align:center;
    color:rgba(242,236,224,0.7);margin-bottom:1.2rem;
    animation:fadeDown 1.4s ease forwards;opacity:0;animation-delay:0.35s;
  }
  .headline em{font-style:normal;color:#8aab7a;}

  .desc{
    font-family:'DM Mono',monospace;font-size:0.62rem;
    line-height:1.9;letter-spacing:0.04em;
    color:rgba(242,236,224,0.22);text-align:center;
    max-width:380px;margin-bottom:3.2rem;
    animation:fadeDown 1.4s ease forwards;opacity:0;animation-delay:0.5s;
  }

  .cta-wrap{
    animation:fadeDown 1.4s ease forwards;opacity:0;animation-delay:0.8s;
    display:flex;flex-direction:column;align-items:center;gap:0.8rem;
  }
  .cta{
    position:relative;display:inline-flex;align-items:center;gap:0.75rem;
    padding:0.85rem 2.2rem;
    border:1px solid rgba(90,154,106,0.3);
    color:rgba(242,236,224,0.75);
    font-family:'DM Mono',monospace;font-size:0.58rem;
    letter-spacing:0.24em;text-transform:uppercase;
    text-decoration:none;cursor:pointer;
    transition:all 0.4s ease;overflow:hidden;
    background:transparent;
  }
  .cta::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(90,154,106,0.07),transparent);
    transform:translateX(-100%);transition:transform 0.6s ease;
  }
  .cta:hover::before{transform:translateX(100%);}
  .cta:hover{border-color:rgba(90,154,106,0.65);color:#8aab7a;box-shadow:0 0 20px rgba(90,154,106,0.08);}
  .cta-leaf{opacity:0.5;transition:transform 0.4s,opacity 0.4s;}
  .cta:hover .cta-leaf{transform:rotate(15deg) scale(1.1);opacity:1;}

  .cta-hint{
    font-family:'DM Mono',monospace;font-size:0.38rem;
    letter-spacing:0.16em;color:rgba(255,255,255,0.1);text-transform:uppercase;
  }

  .shimmer-line{
    position:fixed;bottom:0;left:0;right:0;height:1.5px;
    background:linear-gradient(90deg,#2d5a3d,#8aab7a,#c8a96e,#2d5a3d);
    background-size:300% 100%;animation:shimmer 5s linear infinite;
  }
  @keyframes shimmer{0%{background-position:100% 0;}100%{background-position:-200% 0;}}

  .stats{
    position:fixed;bottom:1.6rem;left:50%;transform:translateX(-50%);
    display:flex;gap:2.5rem;
    animation:fadeUp 1.4s ease forwards;opacity:0;animation-delay:1.2s;
  }
  .stat{display:flex;flex-direction:column;align-items:center;gap:0.15rem;}
  .stat-num{font-size:1rem;font-style:italic;color:rgba(242,236,224,0.4);}
  .stat-label{font-family:'DM Mono',monospace;font-size:0.34rem;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.1);}

  @keyframes fadeDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
</style>
</head>
<body>

<div class="bg-canvas">
  <svg class="stem-1" width="120" height="400" viewBox="0 0 120 400" fill="none" stroke="#5a9a6a" stroke-width="1.5">
    <path d="M60 400 C60 400 60 250 60 200 C60 120 95 80 110 100 C110 100 80 130 72 180"/>
    <path d="M60 280 C60 280 35 250 18 255 C5 260 8 275 20 278 C32 281 60 272 60 280"/>
    <path d="M60 230 C60 230 80 210 90 215 C98 219 94 230 86 233 C78 236 60 228 60 230"/>
  </svg>
  <svg class="stem-2" width="100" height="350" viewBox="0 0 100 350" fill="none" stroke="#5a9a6a" stroke-width="1.2">
    <path d="M50 350 C50 350 50 220 50 180 C50 110 78 75 90 90 C90 90 65 118 58 162"/>
    <path d="M50 250 C50 250 30 228 16 233 C5 237 7 250 18 252 C29 254 50 244 50 250"/>
  </svg>
  <svg class="stem-3" width="80" height="300" viewBox="0 0 80 300" fill="none" stroke="#8aab7a" stroke-width="1">
    <path d="M40 300 C40 300 40 190 40 160 C40 100 62 70 72 82 C72 82 52 104 46 138"/>
    <path d="M40 210 C40 210 24 194 14 198 C6 201 8 211 16 213 C24 215 40 206 40 210"/>
  </svg>
</div>

<div id="particles"></div>

<div class="content">
  <div class="wordmark">Florae</div>
  <div class="tagline-brand">Botanical Intelligence</div>

  <h1 class="headline">
    Every plant has a story.<br>
    <em>We tell it daily.</em>
  </h1>

  <p class="desc">
    A living display of the world's flora — updated every two hours.<br>
    Real weather. Real locations. Real science.
  </p>

  <div class="cta-wrap">
    <a class="cta" href="florae.html">
      <svg class="cta-leaf" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 22 C12 22 12 10 12 7 C12 1 19 -1 23 3 C23 3 16 7 14 12"/>
        <path d="M12 16 C12 16 8 12 4 12 C0 12 0 17 4 19 C8 21 12 17 12 16"/>
      </svg>
      Step into the garden
    </a>
    <span class="cta-hint">Updated every 2 hours · 30 cities worldwide</span>
  </div>
</div>

<div class="stats">
  <div class="stat"><span class="stat-num">30</span><span class="stat-label">Cities</span></div>
  <div class="stat"><span class="stat-num" id="uc">—</span><span class="stat-label">Updates today</span></div>
  <div class="stat"><span class="stat-num">∞</span><span class="stat-label">Species</span></div>
</div>

<div class="shimmer-line"></div>

<script>
const c=document.getElementById('particles');
for(let i=0;i<16;i++){
  const p=document.createElement('div');
  p.className='particle';
  p.style.cssText=`left:${Math.random()*100}vw;bottom:-10px;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*15}s`;
  c.appendChild(p);
}
document.getElementById('uc').textContent=Math.floor(new Date().getHours()/2)+1;
</script>
</body>
</html>
