<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Florae · Botanical Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #0a0a08;
    font-family: 'DM Serif Display', Georgia, serif;
    color: #f2ece0;
    overflow: hidden;
  }

  /* animated botanical bg */
  .bg-canvas {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden;
  }

  .bg-canvas svg {
    position: absolute;
    opacity: 0.04;
  }

  .stem-1 { bottom: -10%; left: 8%; animation: sway 8s ease-in-out infinite; transform-origin: bottom center; }
  .stem-2 { bottom: -5%; right: 12%; animation: sway 11s ease-in-out infinite reverse; transform-origin: bottom center; }
  .stem-3 { bottom: -15%; left: 38%; animation: sway 14s ease-in-out infinite 2s; transform-origin: bottom center; }

  @keyframes sway {
    0%, 100% { transform: rotate(-3deg); }
    50%       { transform: rotate(3deg); }
  }

  /* particles */
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: #5a9a6a;
    animation: float linear infinite;
    opacity: 0;
  }

  @keyframes float {
    0%   { opacity: 0; transform: translateY(0) translateX(0); }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-100vh) translateX(30px); }
  }

  /* main content */
  .content {
    position: relative; z-index: 10;
    width: 100vw; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 0;
  }

  /* logo */
  .logo-wrap {
    margin-bottom: 2.5rem;
    animation: fadeDown 1.2s ease forwards;
    opacity: 0;
  }

  .logo-wrap img {
    height: 80px;
    width: auto;
    filter: brightness(0.9);
  }

  /* tagline above title */
  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #5a9a6a;
    margin-bottom: 1.2rem;
    animation: fadeDown 1.4s ease forwards;
    opacity: 0;
    animation-delay: 0.2s;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .eyebrow::before, .eyebrow::after {
    content: '';
    width: 24px; height: 1px;
    background: rgba(90,154,106,0.4);
  }

  /* headline */
  .headline {
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-style: italic;
    font-weight: 400;
    line-height: 1.1;
    text-align: center;
    color: rgba(242,236,224,0.95);
    margin-bottom: 1.6rem;
    animation: fadeDown 1.4s ease forwards;
    opacity: 0;
    animation-delay: 0.3s;
  }

  .headline em {
    font-style: normal;
    color: #8aab7a;
  }

  /* description */
  .desc {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    line-height: 1.8;
    letter-spacing: 0.04em;
    color: rgba(242,236,224,0.3);
    text-align: center;
    max-width: 420px;
    margin-bottom: 3.5rem;
    animation: fadeDown 1.4s ease forwards;
    opacity: 0;
    animation-delay: 0.5s;
  }

  /* CTA button */
  .cta-wrap {
    animation: fadeDown 1.4s ease forwards;
    opacity: 0;
    animation-delay: 0.8s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .cta {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.9rem 2.2rem;
    background: transparent;
    border: 1px solid rgba(90,154,106,0.4);
    color: rgba(242,236,224,0.85);
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.4s ease;
    overflow: hidden;
  }

  .cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(90,154,106,0.08), transparent);
    transform: translateX(-100%);
    transition: transform 0.6s ease;
  }

  .cta:hover::before { transform: translateX(100%); }

  .cta:hover {
    border-color: rgba(90,154,106,0.8);
    color: #8aab7a;
    box-shadow: 0 0 24px rgba(90,154,106,0.12);
  }

  .cta-leaf {
    opacity: 0.6;
    transition: transform 0.4s ease, opacity 0.4s;
  }
  .cta:hover .cta-leaf {
    transform: rotate(15deg) scale(1.1);
    opacity: 1;
  }

  .cta-hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.42rem;
    letter-spacing: 0.16em;
    color: rgba(255,255,255,0.12);
    text-transform: uppercase;
  }

  /* shimmer bottom line */
  .shimmer-line {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 1.5px;
    background: linear-gradient(90deg, #2d5a3d, #8aab7a, #c8a96e, #2d5a3d);
    background-size: 300% 100%;
    animation: shimmer 5s linear infinite;
  }
  @keyframes shimmer {
    0%   { background-position: 100% 0; }
    100% { background-position: -200% 0; }
  }

  /* stats row */
  .stats {
    position: fixed;
    bottom: 1.8rem; left: 50%; transform: translateX(-50%);
    display: flex; gap: 2.5rem;
    animation: fadeUp 1.4s ease forwards;
    opacity: 0;
    animation-delay: 1.2s;
  }

  .stat {
    display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
  }

  .stat-num {
    font-size: 1rem;
    font-style: italic;
    color: rgba(242,236,224,0.5);
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.38rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
</style>
</head>
<body>

<!-- botanical bg -->
<div class="bg-canvas">
  <!-- stem 1 -->
  <svg class="stem-1" width="120" height="400" viewBox="0 0 120 400" fill="none" stroke="#5a9a6a" stroke-width="1.5">
    <path d="M60 400 C60 400 60 250 60 200 C60 120 95 80 110 100 C110 100 80 130 72 180"/>
    <path d="M60 280 C60 280 35 250 18 255 C5 260 8 275 20 278 C32 281 60 272 60 280"/>
    <path d="M60 230 C60 230 80 210 90 215 C98 219 94 230 86 233 C78 236 60 228 60 230"/>
  </svg>
  <!-- stem 2 -->
  <svg class="stem-2" width="100" height="350" viewBox="0 0 100 350" fill="none" stroke="#5a9a6a" stroke-width="1.2">
    <path d="M50 350 C50 350 50 220 50 180 C50 110 78 75 90 90 C90 90 65 118 58 162"/>
    <path d="M50 250 C50 250 30 228 16 233 C5 237 7 250 18 252 C29 254 50 244 50 250"/>
  </svg>
  <!-- stem 3 -->
  <svg class="stem-3" width="80" height="300" viewBox="0 0 80 300" fill="none" stroke="#8aab7a" stroke-width="1">
    <path d="M40 300 C40 300 40 190 40 160 C40 100 62 70 72 82 C72 82 52 104 46 138"/>
    <path d="M40 210 C40 210 24 194 14 198 C6 201 8 211 16 213 C24 215 40 206 40 210"/>
  </svg>
</div>

<!-- particles -->
<div id="particles"></div>

<div class="content">

  <div class="logo-wrap">
    <img src="logo.png" alt="Florae"/>
  </div>

  <div class="eyebrow">Botanical Intelligence</div>

  <h1 class="headline">
    Every plant has a story.<br>
    <em>We tell it daily.</em>
  </h1>

  <p class="desc">
    A living display of the world's flora — updated every two hours.<br>
    Real weather. Real locations. Real science.
  </p>

  <div class="cta-wrap">
    <a class="cta" href="index.html">
      <svg class="cta-leaf" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 22 C12 22 12 10 12 7 C12 1 19 -1 23 3 C23 3 16 7 14 12"/>
        <path d="M12 16 C12 16 8 12 4 12 C0 12 0 17 4 19 C8 21 12 17 12 16"/>
      </svg>
      Step into the garden
    </a>
    <span class="cta-hint">Updated every 2 hours · 30 cities worldwide</span>
  </div>

</div>

<div class="stats">
  <div class="stat">
    <span class="stat-num">30</span>
    <span class="stat-label">Cities</span>
  </div>
  <div class="stat">
    <span class="stat-num" id="updateCount">—</span>
    <span class="stat-label">Updates today</span>
  </div>
  <div class="stat">
    <span class="stat-num">∞</span>
    <span class="stat-label">Species</span>
  </div>
</div>

<div class="shimmer-line"></div>

<script>
// particles
const container = document.getElementById('particles');
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.bottom = '-10px';
  p.style.animationDuration = (8 + Math.random() * 12) + 's';
  p.style.animationDelay = (Math.random() * 15) + 's';
  p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
  container.appendChild(p);
}

// updates today count
const hour = new Date().getHours();
document.getElementById('updateCount').textContent = Math.floor(hour / 2) + 1;
</script>
</body>
</html>
